name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main # اگر نام برنچ اصلی شما master است، این مقدار را تغییر دهید

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Build Tools & Dependencies
        run: |
          npm install -g browserify terser babelify @babel/core @babel/preset-react

      - name: Build JS Bundle
        run: |
          # اگر فایل اصلی پروژه شما نام دیگری مثل index.jsx دارد، آن را در خط زیر جایگزین app.jsx کنید
          browserify app.jsx -t [ babelify --presets [ @babel/preset-react ] ] -o bundle.js
          
          # فشرده‌سازی کدها
          terser bundle.js --compress --mangle -o bundle.min.js

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          publish_branch: gh-pages
          # فایل‌های اضافی مثل سورس‌ها را می‌توانید با تنظیمات exclude حذف کنید تا فقط بیلد نهایی آپلود شود
          # اگر پوشه css یا فایل‌های دیگری دارید، آن‌ها را هم کپی کنید:
          # cp -r css dist/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist # پوشه‌ای که فایل‌های نهایی در آن قرار دارند

