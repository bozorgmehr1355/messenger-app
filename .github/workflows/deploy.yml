name: Deploy Messenger App

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          publish_dir: .
          publish_branch: gh-pages
          # فایل‌های اضافی مثل سورس‌ها را می‌توانید با تنظیمات exclude حذف کنید تا فقط بیلد نهایی آپلود شود
          # اگر پوشه css یا فایل‌های دیگری دارید، آن‌ها را هم کپی کنید:
          # cp -r css dist/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist # پوشه‌ای که فایل‌های نهایی در آن قرار دارند

